# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
all-features = false

[advisories]
unmaintained = "workspace"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = [
  { crate = "hashbrown@0.12.3", reason = "schemars 0.8.22 -> indexmap 1.9.3 requires old version" },
  { crate = "indexmap@1.9.3", reason = "schemars 0.8.22 requires this version" },
]
skip-tree = []

[licenses]
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
