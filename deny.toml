# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[licenses]
# Allow these licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
]

# Deny copyleft licenses
deny = [
    "GPL-3.0",
    "AGPL-3.0",
]

# Warn on unclear licenses
unlicensed = "deny"
copyleft = "deny"

[bans]
# Warn if multiple versions of same crate
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# Skip known duplicates (add as needed)
skip = []

skip-tree = []

[advisories]
# Deny security vulnerabilities
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"
notice = "warn"

# Ignore specific advisories (add CVE IDs if needed)
ignore = []

[sources]
# Ensure all dependencies come from crates.io
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
