# Bacon configuration for HwpForge
# https://dystroy.org/bacon/

default_job = "check"

[jobs.check]
command = ["cargo", "check", "--all-targets", "--all-features"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]
need_stdout = false

[jobs.test]
command = ["cargo", "nextest", "run", "--all-features"]
need_stdout = true

[jobs.cov]
command = ["cargo", "llvm-cov", "nextest", "--all-features"]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--all-features", "--no-deps", "--open"]
need_stdout = false

[keybindings]
# ctrl-c to quit
q = "job:check"
c = "job:clippy"
t = "job:test"
d = "job:doc"
v = "job:cov"
