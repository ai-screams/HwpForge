# Pre-commit hooks for HwpForge
#
# Pre-commit: MD lint/format + file hygiene + cargo fmt + clippy.
# Pre-push: full `make ci` (fmt + clippy + test + deny + lint).
#
# Install: brew install dprint pre-commit && npm install -g markdownlint-cli2
# Activate: pre-commit install && pre-commit install --hook-type pre-push

repos:
  # ── Markdown ──────────────────────────────────────────────
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        args: ['--fix']

  # ── Formatting (MD, TOML, JSON) ──────────────────────────
  - repo: local
    hooks:
      - id: dprint
        name: dprint format check
        entry: dprint check
        language: system
        pass_filenames: false

  # ── Rust formatting (~1-2s, prevents CI format failures) ─
      - id: cargo-fmt
        name: cargo fmt check
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        types: [rust]

  # ── Rust clippy (~10-20s, catches warnings before CI) ──
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

  # ── Pre-push: full CI pipeline ─────────────────────────
      - id: make-ci
        name: make ci (pre-push)
        entry: make ci
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

  # ── Basic file hygiene ───────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
