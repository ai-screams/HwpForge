# Pre-commit hooks for HwpForge (Hybrid mode)
#
# Light hooks: MD lint/format + file hygiene + cargo fmt.
# Heavy checks (clippy/test) stay in `make ci` to keep commits fast.
#
# Install: brew install dprint pre-commit && npm install -g markdownlint-cli2
# Activate: pre-commit install

repos:
  # ── Markdown ──────────────────────────────────────────────
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        args: ['--fix']

  # ── Formatting (MD, TOML, JSON) ──────────────────────────
  - repo: local
    hooks:
      - id: dprint
        name: dprint format check
        entry: dprint check
        language: system
        pass_filenames: false

  # ── Rust formatting (~1-2s, prevents CI format failures) ─
      - id: cargo-fmt
        name: cargo fmt check
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        types: [rust]

  # ── Basic file hygiene ───────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
