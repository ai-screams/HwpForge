name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? API sketches, examples, or references to other projects are welcome.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - HWPX codec (encode/decode)
        - Markdown bridge
        - Core document model
        - Blueprint (style templates)
        - Python bindings
        - CLI
        - MCP integration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
    validations:
      required: false
