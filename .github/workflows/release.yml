# =============================================================================
# HwpForge Release Pipeline
# =============================================================================
# Calls the CI workflow for full verification, then builds and publishes.
# Triggered by semver tags (v*.*.*) or manual dispatch.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI Verification
    uses: ./.github/workflows/ci.yml
    with:
      run-full-suite: true
    permissions:
      contents: read

  build-release:
    name: Build Release Artifacts
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --workspace --release --all-features
      - name: Package source archive
        run: git archive --format=tar.gz --output hwpforge-${{ github.ref_name }}.tar.gz ${{ github.sha }}
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.ref_name }}
          path: hwpforge-${{ github.ref_name }}.tar.gz
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: [build-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-${{ github.ref_name }}
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/hwpforge-${{ github.ref_name }}.tar.gz
