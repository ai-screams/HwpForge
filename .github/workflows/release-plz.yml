# =============================================================================
# HwpForge Release Automation (release-plz)
# =============================================================================
#
# On push to main:
#   1. Run reusable release preflight from ci.yml
#   2. Publish crates / create GitHub Releases when a release PR was merged
#   3. Create or refresh the next release PR
#   4. Deploy Pages only when a real release was created
# =============================================================================

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release Preflight
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
    with:
      mode: release

  release-plz-release:
    name: Release
    needs: [preflight]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release_plz.outputs.releases_created }}
      releases: ${{ steps.release_plz.outputs.releases }}
    permissions:
      contents: write
      pull-requests: read
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup show
      - name: Run release-plz release
        id: release_plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release PR
    needs: [preflight]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup show
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    name: Pages
    needs: [release-plz-release]
    if: needs.release-plz-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
