# =============================================================================
# HwpForge Release Automation (release-plz)
# =============================================================================
# On push to main:
#   1. CI verification runs first (via workflow_call to ci.yml)
#   2. release-plz-release: Publishes unpublished crates to crates.io + GitHub Release
#   3. release-plz-pr: Creates/updates a Release PR with version bumps + changelog
#
# The release and PR jobs run independently but both wait for CI to pass.
# release-plz-release only publishes if versions were already bumped (by a merged Release PR).
# release-plz-pr only creates/updates a PR if meaningful commits exist.
# =============================================================================

name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: run CI before any release action
  ci:
    name: CI Verification
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release-plz-release:
    name: Release
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for GitHub Releases + tags; branch protection mitigates push risk
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release PR
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
