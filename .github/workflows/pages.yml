# =============================================================================
# HwpForge Pages — mdBook + rustdoc → GitHub Pages
# =============================================================================
# Triggered directly from the release workflow after real releases,
# or manually via workflow_dispatch.
# =============================================================================

name: Pages

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.4.52"
  MDBOOK_ADMONISH_VERSION: "1.20.0"
  MDBOOK_MERMAID_VERSION: "0.17.0"

jobs:
  build:
    name: "Pages > Build"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - uses: Swatinem/rust-cache@v2

      - name: Install mdBook toolchain
        run: |
          set -euo pipefail
          install_root="$RUNNER_TEMP/mdbook-tools"
          echo "$install_root/bin" >> "$GITHUB_PATH"
          cargo install --locked --version "$MDBOOK_VERSION" mdbook --root "$install_root"
          cargo install --locked --version "$MDBOOK_ADMONISH_VERSION" mdbook-admonish --root "$install_root"
          cargo install --locked --version "$MDBOOK_MERMAID_VERSION" mdbook-mermaid --root "$install_root"

      - name: Build mdBook
        run: |
          mdbook-mermaid install .
          mdbook-admonish install .
          mdbook build

      - name: Build rustdoc
        run: |
          cargo doc --workspace --no-deps --all-features --exclude hwpforge-bindings-py --exclude hwpforge-bindings-cli --exclude hwpforge-smithy-hwp5
          cp -r target/doc book/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    name: "Pages > Deploy"
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
