# =============================================================================
# HwpForge npm publish — Binary distribution via npm
# =============================================================================
#
# Triggered on GitHub Release creation (after release-plz publishes a release).
# Builds hwpforge-mcp for 5 targets, publishes platform packages, then the
# base @hwpforge/mcp package with updated optionalDependencies.
# =============================================================================

name: npm publish

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-platform:
    name: "npm › ${{ matrix.npm-suffix }}"
    if: startsWith(github.ref_name, 'v')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            npm-suffix: darwin-arm64
            cross: false
            bin-ext: ""
          - target: x86_64-apple-darwin
            runner: macos-14
            npm-suffix: darwin-x64
            cross: false
            bin-ext: ""
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-suffix: linux-x64
            cross: false
            bin-ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-suffix: linux-arm64
            cross: true
            bin-ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm-suffix: win32-x64
            cross: false
            bin-ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        run: rustup show

      - name: Add cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-rs
        if: matrix.cross
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2.68.25

      - name: Build (native)
        if: "!matrix.cross"
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo build --release -p hwpforge-bindings-mcp --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p hwpforge-bindings-mcp --target ${{ matrix.target }}

      - name: Extract and validate version from tag
        id: version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$version' from tag '$tag'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Update platform package.json version
        shell: bash
        run: |
          pkg="npm/packages/mcp-${{ matrix.npm-suffix }}/package.json"
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' "$pkg" > "$pkg.tmp"
          mv "$pkg.tmp" "$pkg"

      - name: Copy binary to npm package
        shell: bash
        run: |
          bin_dir="npm/packages/mcp-${{ matrix.npm-suffix }}/bin"
          mkdir -p "$bin_dir"
          src="target/${{ matrix.target }}/release/hwpforge-mcp${{ matrix.bin-ext }}"
          dst="$bin_dir/hwpforge-mcp${{ matrix.bin-ext }}"
          cp "$src" "$dst"

      - name: Set executable permission
        if: matrix.bin-ext == ''
        shell: bash
        run: chmod +x "npm/packages/mcp-${{ matrix.npm-suffix }}/bin/hwpforge-mcp"

      - name: Validate binary is not placeholder
        shell: bash
        run: |
          bin="npm/packages/mcp-${{ matrix.npm-suffix }}/bin/hwpforge-mcp${{ matrix.bin-ext }}"
          size=$(wc -c < "$bin")
          if [ "$size" -lt 1000 ]; then
            echo "::error::Binary too small (${size} bytes) — likely a placeholder"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish platform package
        working-directory: npm/packages/mcp-${{ matrix.npm-suffix }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-base:
    name: "npm › @hwpforge/mcp (base)"
    needs: [publish-platform]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract and validate version from tag
        id: version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$version' from tag '$tag'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for npm registry propagation
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          for pkg in mcp-darwin-arm64 mcp-darwin-x64 mcp-linux-x64 mcp-linux-arm64 mcp-win32-x64; do
            for i in $(seq 1 18); do
              if npm view "@hwpforge/${pkg}@${version}" version 2>/dev/null; then
                echo "✓ @hwpforge/${pkg}@${version} available"
                break
              fi
              if [ "$i" -eq 18 ]; then
                echo "::warning::@hwpforge/${pkg}@${version} not yet visible after 3 min"
              fi
              echo "Waiting for @hwpforge/${pkg}@${version} (attempt ${i}/18)..."
              sleep 10
            done
          done

      - name: Update base package.json version and optionalDependencies
        shell: bash
        run: |
          pkg="npm/packages/mcp/package.json"
          v="${{ steps.version.outputs.version }}"
          jq --arg v "$v" '
            .version = $v |
            .optionalDependencies |= with_entries(.value = $v)
          ' "$pkg" > "$pkg.tmp"
          mv "$pkg.tmp" "$pkg"

      - name: Validate version was updated
        shell: bash
        run: |
          actual=$(jq -r '.version' npm/packages/mcp/package.json)
          expected="${{ steps.version.outputs.version }}"
          if [[ "$actual" != "$expected" ]]; then
            echo "::error::Version mismatch: expected $expected, got $actual"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish base package
        working-directory: npm/packages/mcp
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  refresh-context7:
    name: "Context7 › Refresh"
    needs: [publish-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Refresh Context7 index
        uses: rennf93/upsert-context7@c29ca04a37ecbab62635c0e94c3d8908049b9ed5 # 1.1
        continue-on-error: true
        with:
          library-name: HwpForge
