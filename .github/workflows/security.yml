# =============================================================================
# HwpForge Security — Dependency Policy & Advisory Scanning
# =============================================================================
# PR/merge_group: cargo-deny checks licenses, advisories, and bans
# Schedule: Weekly scan of existing dependencies for new advisories
#
# NOTE: actions/dependency-review-action requires GitHub Advanced Security
#       (GHAS), which is unavailable on private repos without enterprise.
#       cargo-deny provides equivalent coverage (advisories + licenses).
# =============================================================================

name: Security

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: "30 3 * * 1"  # Monday 03:30 UTC (30min after CI canary)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-policy:
    name: Dependency Policy (PR)
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check licenses, advisories, and bans
        run: cargo deny --all-features check

  advisory-scan:
    name: Advisory Scan (Weekly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Scan for security advisories
        run: cargo deny --all-features check advisories
