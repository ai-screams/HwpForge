# =============================================================================
# HwpForge Nightly — Security & Compatibility
# =============================================================================
# Weekly maintenance checks that should not slow down contributor feedback:
#   - cargo-deny advisory scan
#   - beta/nightly toolchain canary
# =============================================================================

name: Nightly

on:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  advisory-scan:
    name: "Nightly › Advisory Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Scan for security advisories
        run: cargo deny --all-features check advisories

  toolchain-canary:
    name: "Nightly › Canary (${{ matrix.toolchain }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        toolchain: [beta, nightly]
    continue-on-error: ${{ matrix.toolchain == 'nightly' }}
    steps:
      - uses: actions/checkout@v6
      - name: Install ${{ matrix.toolchain }} toolchain
        run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          key: canary-${{ matrix.toolchain }}
      - name: cargo +${{ matrix.toolchain }} check
        run: cargo +${{ matrix.toolchain }} check --locked --workspace --all-targets --all-features
