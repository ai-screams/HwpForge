# =============================================================================
# HwpForge CI — Verification Workflow
# =============================================================================
#
# Responsibilities
#   - PR / merge queue verification
#   - Reusable preflight for release workflow
#   - Manual full validation when requested
#
# Modes
#   pr          → full contributor checks (coverage + deny + msrv)
#   merge_queue → merge safety checks (skip slow duplicate audits)
#   release     → release preflight (docs build included, no MSRV/coverage/deny)
#   full        → manual full validation
# =============================================================================

name: CI

on:
  workflow_call:
    inputs:
      mode:
        type: string
        default: pr
        description: "Validation mode: pr | merge_queue | release | full"
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: "Validation mode"
        default: full
        options:
          - pr
          - merge_queue
          - release
          - full

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  COVERAGE_THRESHOLD: "90"
  # Keep the docs toolchain on the mdBook 0.4 line until both preprocessors
  # converge on the mdBook 0.5 API surface. mdbook-mermaid 0.16.2 matches
  # mdBook 0.4.52, while mdbook-admonish 1.20.0 still trails by one patch.
  MDBOOK_VERSION: "0.4.52"
  MDBOOK_ADMONISH_VERSION: "1.20.0"
  MDBOOK_MERMAID_VERSION: "0.16.2"
  DPRINT_VERSION: "0.50.1"
  MARKDOWNLINT_CLI2_VERSION: "0.18.1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: "Meta › Mode"
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      run_coverage: ${{ steps.plan.outputs.run_coverage }}
      run_deny: ${{ steps.plan.outputs.run_deny }}
      run_docs_build: ${{ steps.plan.outputs.run_docs_build }}
      run_msrv: ${{ steps.plan.outputs.run_msrv }}
      run_semver: ${{ steps.plan.outputs.run_semver }}
    steps:
      - name: Resolve validation mode
        id: plan
        env:
          REQUESTED_MODE: ${{ inputs.mode || github.event.inputs.mode || '' }}
        run: |
          set -euo pipefail

          mode="${REQUESTED_MODE}"
          if [ -z "$mode" ]; then
            case "${GITHUB_EVENT_NAME}" in
              pull_request) mode="pr" ;;
              merge_group) mode="merge_queue" ;;
              workflow_dispatch) mode="full" ;;
              workflow_call) mode="pr" ;;
              *)
                echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
                exit 1
                ;;
            esac
          fi

          case "$mode" in
            pr)
              run_coverage=true
              run_deny=true
              run_docs_build=true
              run_msrv=true
              run_semver=true
              ;;
            merge_queue)
              run_coverage=false
              run_deny=false
              run_docs_build=true
              run_msrv=false
              run_semver=false
              ;;
            release)
              run_coverage=false
              run_deny=false
              run_docs_build=true
              run_msrv=false
              run_semver=false
              ;;
            full)
              run_coverage=true
              run_deny=true
              run_docs_build=true
              run_msrv=true
              run_semver=true
              ;;
            *)
              echo "Invalid validation mode: $mode" >&2
              exit 1
              ;;
          esac

          {
            echo "mode=$mode"
            echo "run_coverage=$run_coverage"
            echo "run_deny=$run_deny"
            echo "run_docs_build=$run_docs_build"
            echo "run_msrv=$run_msrv"
            echo "run_semver=$run_semver"
          } >> "$GITHUB_OUTPUT"

  lint-format:
    name: "Gate › Format"
    needs: [plan]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  lint-clippy:
    name: "Gate › Clippy"
    needs: [plan]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: "Verify › Test"
    needs: [plan, lint-format, lint-clippy]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest run (all features, ci profile)
        run: cargo nextest run --workspace --all-features --profile ci

  coverage:
    name: "Verify › Coverage (≥ 90%)"
    needs: [plan, lint-format, lint-clippy]
    if: >-
      always() && !failure() && !cancelled() &&
      needs.plan.outputs.run_coverage == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install coverage tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      - name: cargo llvm-cov (fail-under-lines ${{ env.COVERAGE_THRESHOLD }}%)
        run: >-
          cargo llvm-cov nextest
          --workspace --all-features
          --fail-under-lines ${{ env.COVERAGE_THRESHOLD }}
          --lcov --output-path coverage.lcov
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.lcov
          retention-days: 14

  deny:
    name: "Verify › Dependency Policy"
    needs: [plan, lint-format, lint-clippy]
    if: >-
      always() && !failure() && !cancelled() &&
      needs.plan.outputs.run_deny == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny --all-features check

  semver:
    name: "Verify › SemVer"
    needs: [plan, lint-format, lint-clippy]
    if: >-
      always() && !failure() && !cancelled() &&
      needs.plan.outputs.run_semver == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Will start enforcing after first crates.io publish
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check semver compatibility
        uses: obi1kenobi/cargo-semver-checks-action@v2

  lint-docs:
    name: "Verify › Docs Lint"
    needs: [plan]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: dprint check
        run: npx dprint@${{ env.DPRINT_VERSION }} check
      - name: markdownlint-cli2
        run: npx markdownlint-cli2@${{ env.MARKDOWNLINT_CLI2_VERSION }} "**/*.md"

  docs-build:
    name: "Verify › Docs Build"
    needs: [plan, lint-format, lint-clippy]
    if: >-
      always() && !failure() && !cancelled() &&
      needs.plan.outputs.run_docs_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook toolchain
        run: |
          set -euo pipefail
          install_root="$RUNNER_TEMP/mdbook-tools"
          echo "$install_root/bin" >> "$GITHUB_PATH"
          cargo install --locked --version "$MDBOOK_VERSION" mdbook --root "$install_root"
          cargo install --locked --version "$MDBOOK_ADMONISH_VERSION" mdbook-admonish --root "$install_root"
          cargo install --locked --version "$MDBOOK_MERMAID_VERSION" mdbook-mermaid --root "$install_root"
      - name: Build mdBook
        run: mdbook build
      - name: Build rustdoc
        run: >-
          cargo doc --workspace --no-deps --all-features
          --exclude hwpforge-bindings-py
          --exclude hwpforge-bindings-cli
          --exclude hwpforge-smithy-hwp5

  msrv:
    name: "Verify › MSRV (1.88)"
    needs: [plan, lint-format, lint-clippy]
    if: >-
      always() && !failure() && !cancelled() &&
      needs.plan.outputs.run_msrv == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install MSRV toolchain (1.88)
        run: rustup toolchain install 1.88 --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: cargo +1.88 check
        run: cargo +1.88 check --workspace --all-features

  workflow-compat:
    name: "Standalone › Workflow Lint"
    needs: [plan]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color
      - name: Verify core action major versions
        run: |
          set -euo pipefail
          if grep -R -nE 'actions/checkout@v([0-5])\b|actions/setup-node@v([0-5])\b|actions/(download|upload)-artifact@v([0-3])\b' .github/workflows/*.yml; then
            echo "::error::Outdated core action major version detected"
            exit 1
          fi
