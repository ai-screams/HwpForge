name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*.*.*"
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  COVERAGE_THRESHOLD: "90"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-compat:
    name: Workflow Compatibility
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Lint GitHub workflow files
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
      - name: Verify core action major baselines
        run: |
          set -euo pipefail
          if grep -R -nE 'actions/checkout@v([0-5])\b|actions/setup-node@v([0-5])\b|actions/download-artifact@v([0-4])\b' .github/workflows/*.yml; then
            echo "Outdated core action major version detected."
            exit 1
          fi

  fmt:
    name: Rust Format
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Rust Clippy
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  lint-docs:
    name: Docs Lint
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install markdown tooling
        run: npm install -g dprint markdownlint-cli2
      - name: Run dprint check
        run: dprint check
      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md"

  test:
    name: Commit Preflight
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Run fast compile preflight
        run: cargo check --workspace --all-features

  coverage:
    name: Coverage (>= 90%)
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install coverage tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      - name: Run coverage gate
        run: cargo llvm-cov nextest --workspace --all-features --fail-under-lines ${{ env.COVERAGE_THRESHOLD }} --lcov --output-path coverage.lcov
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.lcov
          retention-days: 14

  deny:
    name: Dependency Policy (cargo-deny)
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Run cargo-deny
        run: cargo deny --all-features check

  msrv:
    name: MSRV Check (1.75)
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.75
        run: rustup toolchain install 1.75 --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Check against MSRV
        run: cargo +1.75 check --workspace --all-features

  cross-platform:
    name: Cross-Platform Build Check
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check
        run: cargo check --workspace --all-targets --all-features

  toolchain-canary:
    name: Canary Toolchain Check
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - beta
          - nightly
    continue-on-error: ${{ matrix.toolchain == 'nightly' }}
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check
        run: cargo +${{ matrix.toolchain }} check --workspace --all-targets --all-features

  merge-smoke:
    name: Merge Smoke (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install smoke tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny
      - name: Run smoke tests
        run: cargo nextest run --workspace --all-features --profile ci
      - name: Run dependency policy check
        run: cargo deny --all-features check
